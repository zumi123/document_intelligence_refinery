# Extraction thresholds and chunking constitution (interim)
# Document in DOMAIN_NOTES.md; adjust empirically per corpus.

thresholds:
  min_chars_per_page: 100
  max_image_area_ratio: 0.5
  fast_text_min_confidence: 0.7
  layout_min_confidence: 0.7

chunking:
  max_tokens_per_ldu: 512
  keep_numbered_lists_together: true
  attach_captions_to_figures: true

domain_keywords:
  financial: ["revenue", "expenditure", "balance sheet", "income statement", "fiscal", "audit", "annual report"]
  legal: ["whereas", "hereby", "pursuant", "agreement", "clause", "party"]
  technical: ["implementation", "assessment", "methodology", "findings", "recommendation"]
  medical: ["patient", "clinical", "diagnosis", "treatment", "dosage"]
